workflows:
  android-workflow:
    name: Flashlight Android Build
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Set up local.properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        script: chmod +x gradlew

      - name: Build debug APK
        script: ./gradlew assembleDebug --stacktrace

    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - your@email.com        # ← change this to your email
        notify:
          success: true
          failure: true
