name: Build Flashlight APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle & generate wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip
          export PATH=$PWD/gradle-8.7/bin:$PATH
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH
          gradle wrapper --gradle-version=8.7

      - name: Set up Android SDK (API 36)
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 36
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;34.0.0" || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flashlight-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
